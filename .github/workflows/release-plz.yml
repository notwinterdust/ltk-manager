name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'LeagueToolkit' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-linux-deps
        name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'LeagueToolkit' }}
    permissions:
      contents: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      releases: ${{ steps.release.outputs.releases }}
    steps:
      - *checkout
      - *install-linux-deps
      - *install-rust
      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - uses: pnpm/action-setup@v4

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      - name: Extract release info
        id: release_info
        shell: powershell
        run: |
          $releases = '${{ needs.release-plz-release.outputs.releases }}' | ConvertFrom-Json
          $release = $releases | Where-Object { $_.package_name -eq "ltk-manager" }

          if ($release) {
            $version = $release.version
            $tag = $release.tag
            echo "version=$version" >> $env:GITHUB_OUTPUT
            echo "tag=$tag" >> $env:GITHUB_OUTPUT
            echo "should_build=true" >> $env:GITHUB_OUTPUT

            # MSI only supports numeric pre-release identifiers, so skip it for semver pre-releases like "beta.1"
            if ($version -match '-') {
              echo "is_prerelease=true" >> $env:GITHUB_OUTPUT
              echo "Found pre-release: $tag v$version - building NSIS only"
            } else {
              echo "is_prerelease=false" >> $env:GITHUB_OUTPUT
              echo "Found release: $tag v$version - building NSIS + MSI"
            }
          } else {
            echo "No ltk-manager release found, skipping build"
            echo "should_build=false" >> $env:GITHUB_OUTPUT
          }

      - name: Update tauri.conf.json for release
        if: steps.release_info.outputs.should_build == 'true'
        working-directory: src-tauri
        shell: powershell
        run: |
          $config = Get-Content tauri.conf.json | ConvertFrom-Json
          $config.version = "${{ steps.release_info.outputs.version }}"

          # MSI only supports numeric pre-release identifiers, so skip it for semver pre-releases
          if ("${{ steps.release_info.outputs.is_prerelease }}" -eq "true") {
            $config.bundle.targets = @("nsis")
          }

          $config | ConvertTo-Json -Depth 10 | Set-Content tauri.conf.json

      - name: Build Tauri app
        if: steps.release_info.outputs.should_build == 'true'
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate updater manifest
        if: steps.release_info.outputs.should_build == 'true'
        shell: powershell
        run: |
          $version = "${{ steps.release_info.outputs.version }}"
          $tag = "${{ steps.release_info.outputs.tag }}"
          $bundlePath = "target/release/bundle"

          # v2 updater artifacts: .exe + .exe.sig (not .nsis.zip)
          $nsisExe = Get-ChildItem "$bundlePath/nsis/*.exe" | Select-Object -First 1
          $nsisSig = (Get-Content "$($nsisExe.FullName).sig" -Raw).Trim()

          # GitHub replaces spaces with dots in asset filenames, so match that in the URL
          $assetName = $nsisExe.Name -replace ' ', '.'
          $downloadUrl = "https://github.com/LeagueToolkit/ltk-manager/releases/download/$tag/$assetName"

          $latest = @{
            version  = $version
            notes    = "See the full changelog at https://github.com/LeagueToolkit/ltk-manager/releases/tag/$tag"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisSig
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          Set-Content "latest.json" $latest
          echo "Generated latest.json for $version"

      - name: Upload NSIS release assets
        if: steps.release_info.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI release assets
        if: steps.release_info.outputs.should_build == 'true' && steps.release_info.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.msi.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update stable updater release
        if: steps.release_info.outputs.should_build == 'true'
        shell: bash
        run: |
          # Create or update a pinned "updater" release that always serves the latest latest.json.
          # The updater endpoint points here so it works regardless of GitHub's prerelease flag.
          if gh release view updater &>/dev/null; then
            gh release upload updater latest.json --clobber
          else
            gh release create updater latest.json \
              --title "Updater" \
              --notes "Auto-updated by CI. Contains the latest updater manifest for in-app updates." \
              --latest=false
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
